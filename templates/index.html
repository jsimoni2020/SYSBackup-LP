<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSBackup-LP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { font-size: 2rem; margin-bottom: 6px; color: #fff; }
        .subtitle { color: #aaa; margin-bottom: 40px; font-size: 0.95rem; }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .route-info {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            font-size: 0.88rem;
            color: #aaa;
        }
        .route-info span { color: #7ec8e3; font-weight: 600; }
        #backup-btn {
            background: #0f3460;
            color: #fff;
            border: 2px solid #7ec8e3;
            padding: 14px 36px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            width: 100%;
            margin-bottom: 20px;
        }
        #backup-btn:hover:not(:disabled) { background: #7ec8e3; color: #1a1a2e; }
        #backup-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #status-msg {
            text-align: center;
            margin-bottom: 20px;
            min-height: 24px;
            font-size: 0.95rem;
        }
        .running { color: #f0a500; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .log-header h3 { font-size: 0.95rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        #refresh-log { background: none; border: 1px solid #444; color: #aaa; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        #refresh-log:hover { border-color: #7ec8e3; color: #7ec8e3; }
        #log-output {
            background: #0a0a1a;
            border-radius: 6px;
            padding: 16px;
            font-family: "SF Mono", "Courier New", monospace;
            font-size: 0.78rem;
            line-height: 1.6;
            color: #ccc;
            white-space: pre-wrap;
            word-break: break-all;
            height: 360px;
            overflow-y: auto;
        }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #f0a500; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>SYSBackup-LP</h1>
    <p class="subtitle">Downloads → 2TB WorkDrive Backup</p>

    <div class="card">
        <div class="route-info">
            <div>Source: <span>/Users/justin.simoni/Downloads</span></div>
            <div>Destination: <span>/Volumes/2TB WorkDrive/Backup</span></div>
        </div>

        <button id="backup-btn" onclick="startBackup()">Run Backup Now</button>
        <div id="status-msg"></div>

        <div class="log-header">
            <h3>Backup Log</h3>
            <button id="refresh-log" onclick="loadLog()">Refresh</button>
        </div>
        <div id="log-output">Loading log...</div>
    </div>

    <script>
        let pollInterval = null;

        function startBackup() {
            const btn = document.getElementById("backup-btn");
            const msg = document.getElementById("status-msg");
            btn.disabled = true;
            msg.innerHTML = '<span class="running"><span class="spinner"></span>Backup in progress...</span>';

            fetch("/backup", { method: "POST" })
                .then(r => r.json())
                .then(data => {
                    if (data.status === "already_running") {
                        msg.innerHTML = '<span class="running">Backup is already running...</span>';
                    }
                    pollStatus();
                });
        }

        function pollStatus() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => {
                fetch("/status").then(r => r.json()).then(data => {
                    if (!data.running) {
                        clearInterval(pollInterval);
                        const btn = document.getElementById("backup-btn");
                        const msg = document.getElementById("status-msg");
                        btn.disabled = false;
                        msg.innerHTML = '<span class="success">Backup completed.</span>';
                        loadLog();
                    } else {
                        loadLog();
                    }
                });
            }, 2000);
        }

        function loadLog() {
            fetch("/log").then(r => r.json()).then(data => {
                const el = document.getElementById("log-output");
                el.textContent = data.log;
                el.scrollTop = el.scrollHeight;
            });
        }

        loadLog();
    </script>
</body>
</html>
